<!DOCTYPE html>
<html>

<head>
<title>Realtime Chat</title>

<script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>

<style>

body{
font-family: Arial;
background:#0f172a;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}

.chat-container{
width:420px;
height:600px;
background:#1e293b;
border-radius:10px;
display:flex;
flex-direction:column;
color:white;
}

.header{
background:#4f46e5;
padding:15px;
font-size:20px;
font-weight:bold;
text-align:center;
}

.messages{
flex:1;
padding:15px;
overflow-y:auto;
}

.message{
background:#334155;
padding:10px;
margin-bottom:10px;
border-radius:10px;
max-width:70%;
}

.input-area{
display:flex;
padding:10px;
border-top:1px solid #444;
}

.input-area input{
flex:1;
padding:10px;
border-radius:6px;
border:none;
}

.input-area button{
margin-left:10px;
padding:10px 15px;
background:#4f46e5;
color:white;
border:none;
border-radius:6px;
cursor:pointer;
}
.message-row{
display:flex;
align-items:flex-end;
margin-bottom:10px;
}

.message-row.own{
flex-direction:row-reverse;
}

.avatar{
width:35px;
height:35px;
border-radius:50%;
background:#6366f1;
display:flex;
align-items:center;
justify-content:center;
color:white;
font-weight:bold;
margin:5px;
}

.bubble{
background:#334155;
padding:10px;
border-radius:10px;
max-width:70%;
}

.message-row.own .bubble{
background:#4f46e5;
}

.name{
font-weight:bold;
font-size:12px;
}

.time{
font-size:10px;
color:#bbb;
margin-top:3px;
}

</style>

</head>

<body>

<div class="chat-container">

<div class="header">
Realtime Chat
<div style="font-size:12px">Online Users: <span id="users">0</span></div>
</div>

<div id="messages" class="messages"></div>
<div id="typing" style="font-size:12px;color:gray;padding-left:10px"></div>

<div class="input-area">

<input id="messageInput" placeholder="Type message">

<button onclick="sendMessage()">Send</button>

</div>

</div>

<script src="chat.js"></script>

</body>
</html>
