<!DOCTYPE html>
<html>

<head>

<title>Realtime Chat</title>

<script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>

<style>

body{
margin:0;
font-family:Arial;
background:#0f172a;
display:flex;
justify-content:center;
}

.container{
display:flex;
width:900px;
height:100vh;
}

.sidebar{
width:220px;
background:#111827;
color:white;
padding:15px;
}

.sidebar h3{
text-align:center;
}

.sidebar ul{
list-style:none;
padding:0;
}

.sidebar li{
padding:6px;
border-bottom:1px solid #333;
}

.chat{
flex:1;
display:flex;
flex-direction:column;
background:#1f2937;
}

.header{
background:#4f46e5;
color:white;
padding:12px;
text-align:center;
font-weight:bold;
}

#messages{
flex:1;
overflow-y:auto;
padding:10px;
}

.message{
display:flex;
align-items:flex-start;
margin:10px 0;
}

.own{
justify-content:flex-end;
}

.avatar{
width:35px;
height:35px;
border-radius:50%;
background:#6366f1;
color:white;
display:flex;
align-items:center;
justify-content:center;
margin-right:8px;
font-weight:bold;
}

.own .avatar{
order:2;
margin-left:8px;
margin-right:0;
}

.bubble{
background:#374151;
padding:10px;
border-radius:10px;
color:white;
max-width:250px;
}

.own .bubble{
background:#6366f1;
}

.name{
font-weight:bold;
}

.time{
font-size:10px;
opacity:0.7;
}

.system{
text-align:center;
color:#aaa;
font-size:12px;
margin:5px 0;
}

.inputArea{
display:flex;
padding:10px;
}

input{
flex:1;
padding:10px;
border:none;
}

button{
padding:10px 15px;
background:#6366f1;
color:white;
border:none;
cursor:pointer;
}

#typing{
font-size:12px;
color:#bbb;
padding-left:10px;
}

</style>

</head>

<body>

<div class="container">

<div class="sidebar">

<h3>Online Users</h3>

<ul id="usersList"></ul>

</div>

<div class="chat">

<div class="header">
Realtime Chat<br>
Online Users: <span id="onlineCount">0</span>
</div>

<div id="messages"></div>

<div id="typing"></div>

<div class="inputArea">

<input id="messageInput" placeholder="Type message">

<button id="sendBtn">Send</button>

</div>

</div>

</div>

<audio id="msgSound">
<source src="https://www.soundjay.com/buttons/sounds/button-3.mp3">
</audio>

<script src="chat.js"></script>

</body>

</html>
